<!-- <div class="container-fluid mt-4"> -->
<div class="form-container mt-5" style="margin-left: 200px;">
<h1>Order Mapping</h1>
 
<!-- <div  *ngFor="let stat of stats"> {{ stat.title}}</div>

  -->

    <div class="centered-div">
  <button class="mat-button" mat-raised-button  style="background-color: rgb(255, 147, 5); width: 10pc; height: 4pc;      color: white;" (click)="submit($event)" >Merg Order</button> &nbsp;&nbsp;&nbsp;&nbsp;
</div>
    
    
    <!-- TABLE SECTION -->
    <div class="row mt-4">

        <!-- LIVE TRADING -->
  

        <div class="col-lg-6 mb-3">
            <div class="card">

                 <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Mapped Order</h5>
                   
                </div> 

                <div class="table-responsive">
                    
                    <mat-card>
 
                        
                        <table mat-table [dataSource]="dataSource2" #sellerSort="matSort" matSort>

   
                            <ng-container matColumnDef="select">

                                <th mat-header-cell *matHeaderCellDef> Select</th>
                                <td mat-cell *matCellDef="let element">
                               
                                    <mat-checkbox class="example-margin"> </mat-checkbox>
                                </td>
                                 

                            </ng-container>

                            
                                    
                      
                            <ng-container matColumnDef="seller_name">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Seller Name </th>
                                <td mat-cell *matCellDef="let element">
                                    {{element.seller_name}}
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="category_name">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Category </th>
                                <td mat-cell *matCellDef="let element">
                                    {{element.category_name}}
                                </td>
                            </ng-container>

                             <ng-container matColumnDef="quantity">
                                <th mat-header-cell *matHeaderCellDef  mat-sort-header > Selling Qty </th>
                                <td mat-cell *matCellDef="let element">
                                    {{element.quantity}}
                                </td>
                            </ng-container>
 
                            <ng-container matColumnDef="sell_price">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header > Selling Rate </th>
                                <td mat-cell *matCellDef="let element">
                                    {{element.sell_price}}
                                </td>
                            </ng-container>


                    
                       

                             <ng-container matColumnDef="created_date">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header >Created Date</th>
                                <td mat-cell *matCellDef="let element">
                                   {{ element.created_date | date: 'dd/MM/yyyy, h:mm a ' }}
                                </td>
                            </ng-container>  
 
                   
                            


                            <tr mat-header-row *matHeaderRowDef="sellerDisplayedColumns"></tr>
                            <tr mat-row *matRowDef="let row; columns: sellerDisplayedColumns;"></tr>

                        </table>

                        <mat-paginator [length]="selling.length"
                         #paginator1
                            [pageSize]="10"
                            [pageSizeOptions]="[10, 20, 30, 100]"
                            aria-label="Select page">
                        </mat-paginator>




                    </mat-card>
                </div>

            </div>
        </div>


      
 
    </div>
</div>
