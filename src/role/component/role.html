<div>
<div class="center-container">
    <div class="centered-div">
<h2>Role</h2> 
 


  <mat-form-field appearance="outline"  >
    <mat-label>Enter your Role</mat-label>
    <input
      matInput
      placeholder="Enter Role"
      [formControl]="rolefield"
     
      required
    />
 
  
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Enter Description</mat-label>
    <input
      matInput
      placeholder="Enter Description"
      [formControl]="description"
     
      
    />
    
      


  </mat-form-field>
  <br/>
<button class="mat-button" mat-raised-button  color="primary" (click)="onClick($event)">Submit</button> &nbsp;&nbsp;&nbsp;&nbsp;
<button class="mat-button" mat-raised-button  color="primary" (click)="clear()">Clear</button>

</div>
     </div>
<br/><br/><br/><br/><br/><br/>
     
<div class="table-div">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> No. </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="role_name">
    <th mat-header-cell *matHeaderCellDef> Role </th>
    <td mat-cell *matCellDef="let element"> {{element.role_name}} </td>
  </ng-container>
 
    <!-- Name Column -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> Description </th>
    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
  </ng-container>

  <ng-container matColumnDef="created_date">
    <th mat-header-cell *matHeaderCellDef> Created Date </th>
    <td mat-cell *matCellDef="let element"> {{element.created_date}} </td>
  </ng-container>
 
     <ng-container matColumnDef="actions">
                  <th mat-header-cell *matHeaderCellDef>Action</th>
                  <td mat-cell *matCellDef="let element">
                    <button
                      mat-icon-button
                      matTooltip="Click to edit"
                      class="iconbutton text-danger"
                    >
                      <mat-icon
                        aria-label="Delete"
                        (click)="edit(element)"
                        >edit</mat-icon
                      >
                    </button>
                    <button
                      mat-icon-button
                      matTooltip="Click to Delete"
                      class="iconbutton text-danger"
                    >
                      <mat-icon
                        aria-label="Delete"
                        (click)="delete(element)"
                        >delete</mat-icon
                      >
                    </button>
                  </td>
                </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
</table>
  

<br/>


</div>
<div class="paginator-div">
<mat-paginator
    [pageSizeOptions]="[10, 20]"
    showFirstLastButtons
    aria-label="Select page of users">
  </mat-paginator>

</div>
