
<div class="center-container">
    <div class="centered-div">
<h2>USER</h2> 
 
  <form class="login-form" id="userForm"  [formGroup]="userForm"  >
<div class="form-container">

  <mat-form-field appearance="outline">
    <mat-label>Enter User Name</mat-label>
    <input
      matInput
      placeholder="Enter User Name"
      formControlName="userNameField"  
      required
    />
  </mat-form-field>
<!-- 
  <mat-form-field appearance="outline">
    <mat-label>Enter Password</mat-label>
    <input
      matInput
      placeholder="Enter Password"
      [formControl]="passwordField"
     
      
    /> 

  </mat-form-field> -->
  &nbsp;   &nbsp;   &nbsp;
  <mat-form-field appearance="outline">
    <mat-label>Enter password</mat-label>
    <input matInput [type]="hide() ? 'password' : 'text'"    formControlName="passwordField"    required />
    <button
      matIconButton
      matSuffix
      (click)="clickEvent($event)"
      [attr.aria-label]="'Hide password'"
      [attr.aria-pressed]="hide()"
    >
      <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>


   

  </div>

  <div class="form-container">

  <mat-form-field appearance="outline">
  <mat-label>Select</mat-label>
  
 
  <mat-select placeholder="Select Role" name="education_level"  formControlName="education_level" >
    <mat-option *ngFor="let role of roledata" [value]="role.id" >{{ role.role_name}}</mat-option>
  </mat-select>
</mat-form-field>

  
 
    &nbsp;   &nbsp;   &nbsp;
  <mat-form-field appearance="outline">
    <mat-label>Enter Email Address</mat-label>
    <input
      matInput
      placeholder="Enter Email Address"
     formControlName="emailField"
    /> 
  </mat-form-field>


    <div class="form-container">
     <mat-checkbox class="example-margin"  style="font-size: large;"  formControlName="isChecked" (change)="toggle($event)"> Active </mat-checkbox>
  </div>
</div>

  <br/>

 <button class="mat-button" mat-raised-button  style="background-color: rgb(255, 147, 5); width: 10pc;      color: white;"  (click)="onClick($event)" >Submit</button> &nbsp;&nbsp;&nbsp;&nbsp;
<button class="mat-button" mat-raised-button  style="background-color: rgb(255, 147, 5); width: 10pc;    color: white;" (click)="clear()">Clear</button>
  </form>

</div>
</div>

     
<div class="table-div">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> No. </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="user_name">
    <th mat-header-cell *matHeaderCellDef> User Name </th>
    <td mat-cell *matCellDef="let element"> {{element.user_name}} </td>
  </ng-container>
 
    <!-- Name Column -->
  <ng-container matColumnDef="email_address">
    <th mat-header-cell *matHeaderCellDef> Email Address </th>
    <td mat-cell *matCellDef="let element"> {{element.email_address}} </td>
  </ng-container>


  <ng-container matColumnDef="created_date">
    <th mat-header-cell *matHeaderCellDef> Created Date </th>
    <td mat-cell *matCellDef="let element"> {{element.created_date}} </td>
  </ng-container>
 

  
     <ng-container matColumnDef="actions">
                  <th mat-header-cell *matHeaderCellDef>Action</th>
                  <td mat-cell *matCellDef="let element">
                    <button
                      mat-icon-button
                      matTooltip="Click to edit"
                      class="iconbutton text-danger"
                    >
                      <mat-icon
                        aria-label="Delete"
                        (click)="edit(element)"
                        >edit</mat-icon
                      >
                    </button>
                    <button
                      mat-icon-button
                      matTooltip="Click to Delete"
                      class="iconbutton text-danger"
                    >
                      <mat-icon
                        aria-label="Delete"
                        (click)="delete(element)"
                        >delete</mat-icon
                      >
                    </button>
                  </td>
                </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
</table>
  

<br/>


</div>
<div class="paginator-div">
<mat-paginator
    [pageSizeOptions]="[10, 20]"
    showFirstLastButtons
    aria-label="Select page of userdata">
  </mat-paginator>

</div>
